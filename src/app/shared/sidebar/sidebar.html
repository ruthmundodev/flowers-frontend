<!-- Botón hamburguesa — solo visible en móvil -->
<button class="hamburger-btn" (click)="mobileOpen = true" aria-label="Abrir menú">
  <i class="ti ti-menu-2"></i>
</button>

<!-- Backdrop para cerrar el drawer -->
<div class="sidebar-backdrop" [class.sidebar-backdrop--visible]="mobileOpen"
     (click)="mobileOpen = false"></div>

<aside class="sidebar" [class.sidebar--open]="mobileOpen">
  <div class="sidebar-brand">
    <div class="brand-dot"></div>
    <span class="brand-name" [title]="nombreUsuario">{{ nombreUsuario }}</span>
    <button class="logout-btn close-mobile-btn" (click)="mobileOpen = false"
            aria-label="Cerrar menú" title="Cerrar menú">
      <i class="ti ti-x"></i>
    </button>
    <button class="logout-btn" (click)="logout()" title="Cerrar sesión" aria-label="Cerrar sesión">
      <i class="ti ti-logout"></i>
    </button>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-group-label">General</div>
    <a class="nav-item" routerLink="/dashboard" routerLinkActive="active">
      <i class="ti ti-layout-dashboard"></i>
      <span>Dashboard</span>
    </a>
    <a class="nav-item" routerLink="/siembras" routerLinkActive="active">
      <i class="ti ti-seeding"></i>
      <span>Siembras</span>
      <span class="nav-badge">3</span>
    </a>
    <a class="nav-item" routerLink="/cosechas" routerLinkActive="active">
      <i class="ti ti-basket"></i>
      <span>Cosechas</span>
    </a>
    <a class="nav-item" routerLink="/inventario" routerLinkActive="active" *ngIf="puedeVer('Inventario')">
      <i class="ti ti-box"></i>
      <span>Inventario</span>
      <span class="nav-badge nav-badge--warn">2</span>
    </a>
    <a class="nav-item" routerLink="/quimico" routerLinkActive="active" *ngIf="puedeVer('Quimico')">
      <i class="ti ti-flask"></i>
      <span>Químicos</span>
    </a>
    <a class="nav-item" routerLink="/temporada" routerLinkActive="active" *ngIf="puedeVer('Temporada')">
      <i class="ti ti-calendar"></i>
      <span>Temporadas</span>
    </a>
    <a class="nav-item" routerLink="/anuncios" routerLinkActive="active" *ngIf="puedeVer('Anuncios')">
      <i class="ti ti-speakerphone"></i>
      <span>Anuncios</span>
    </a>

    <!-- Reportes — colapsable, cerrado por defecto -->
    <button class="nav-group-label nav-group-label--toggle"
            (click)="reportesAbierto = !reportesAbierto">
      Reportes
      <i class="ti ti-chevron-right nav-chevron" [class.nav-chevron--open]="reportesAbierto"></i>
    </button>
    <div class="nav-group-items" [class.nav-group-items--open]="reportesAbierto">
      <a class="nav-item" routerLink="/rendimientos" routerLinkActive="active" *ngIf="puedeVer('Rendimientos')">
        <i class="ti ti-chart-line"></i>
        <span>Rendimientos</span>
      </a>
      <a class="nav-item" routerLink="/parcelas" routerLinkActive="active">
        <i class="ti ti-map"></i>
        <span>Parcelas</span>
      </a>
      <a class="nav-item" routerLink="/exportar" routerLinkActive="active">
        <i class="ti ti-file-export"></i>
        <span>Exportar</span>
      </a>
    </div>

    <!-- Administración — colapsable, cerrado por defecto -->
    <ng-container *ngIf="esAdmin">
      <button class="nav-group-label nav-group-label--toggle"
              (click)="adminAbierto = !adminAbierto">
        Administración
        <i class="ti ti-chevron-right nav-chevron" [class.nav-chevron--open]="adminAbierto"></i>
      </button>
      <div class="nav-group-items" [class.nav-group-items--open]="adminAbierto">
        <a class="nav-item" routerLink="/usuarios" routerLinkActive="active">
          <i class="ti ti-users"></i>
          <span>Usuarios</span>
        </a>
        <a class="nav-item" routerLink="/asignaciones" routerLinkActive="active">
          <i class="ti ti-user-cog"></i>
          <span>Asignaciones</span>
        </a>
      </div>
    </ng-container>
  </nav>

  <div class="sidebar-footer">
    <div class="inv-select-wrapper">
      <i class="ti ti-building-warehouse inv-icon"></i>
      <select class="farm-select"
              (change)="cambiarInvernadero($any($event.target).value)">
        <option value="" [selected]="invernaderoActivoId() === null">Todos los invernaderos</option>
        <option *ngFor="let inv of invernaderos()"
                [value]="inv.id"
                [selected]="invernaderoActivoId() === inv.id">
          #{{ inv.numero }} — {{ inv.nombreCultivo }}
        </option>
      </select>
      <i class="ti ti-chevron-down inv-chevron"></i>
    </div>
  </div>
</aside>
